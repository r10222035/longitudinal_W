# Sherpa configuration for VBS W-W-jj with polarization information
# Kinematic cuts updated for Same-sign WW analysis

EVENTS: 100
RANDOM_SEED: 1

BEAMS: 2212
BEAM_ENERGIES: 6500

PDF_SET: PDF4LHC21_40_pdfas

ME_GENERATORS:
  - Comix
COMIX_DEFAULT_GAUGE: 0

# scales
MEPS:
  CORE_SCALE: VAR{0.5*Abs2(p[2]+p[3])} 

# 物理常數與寬度設定：保留 Ward Identities
PARTICLE_DATA:
  24: {Width: 0}   # W Boson
  23: {Width: 0}   # Z Boson
WIDTH_SCHEME: Fixed

# 衰變通道與極化設置
HARD_DECAYS:
  Enabled: true
  Channels:
    -24,-12,11: {Status: 2}   # W- -> nubar e-
    -24,-14,13: {Status: 2}   # W- -> nubar mu-
  Pol_Cross_Section:
    Enabled: true
    Reference_System: [Lab, COM]

# 過程定義：純電弱 VBS 同號雙 W-
PROCESSES:
  - 93 93 -> -24 -24 93 93:
      Order: {QCD: 0, EW: 4}

# final state particles cuts
SELECTORS:

  - [PT, 93, 34, 10000]
  - [Eta, 93, -4.6, 4.6]
  - [Mass, 93, 93, 480, 10000]
  - [DY, 93, 93, 1.9, 10000]

  - VariableSelector:
      Variable: PT
      Flavs: 93
      Ranges:
        - [60.0, 10000.0]
      Ordering: [PT_UP]

# 輸出設置
EVENT_OUTPUT: HepMC3_GenEvent[EW_WmWmjj.hepmc]