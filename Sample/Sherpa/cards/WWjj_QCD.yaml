# 檔案名稱：WWjj_QCD.yaml
EVENTS: 100
RANDOM_SEED: 1

BEAMS: 2212
BEAM_ENERGIES: 6500

PDF_SET: PDF4LHC21_40_pdfas

ME_GENERATORS:
  - Comix
COMIX_DEFAULT_GAUGE: 0

MEPS:
  CORE_SCALE: VAR{0.5*Abs2(p[2]+p[3])} 

PARTICLE_DATA:
  24: {Width: 0}   # W Boson
WIDTH_SCHEME: Fixed

HARD_DECAYS:
  Enabled: true
  Channels:
    # W+ decays
    24,12,-11: {Status: 2}   # W+ -> nu_e e+
    24,14,-13: {Status: 2}   # W+ -> nu_mu mu+
    # W- decays
    -24,-12,11: {Status: 2}  # W- -> nubar_e e-
    -24,-14,13: {Status: 2}  # W- -> nubar_mu mu-

PROCESSES:
  - 93 93 -> 24 24 93 93:
      Order: {QCD: 2, EW: 2}
  - 93 93 -> -24 -24 93 93:
      Order: {QCD: 2, EW: 2}

SELECTORS:
  - [PT, 93, 34, 10000]
  - [Eta, 93, -4.6, 4.6]
  - [Mass, 93, 93, 180, 10000]
  - [DY, 93, 93, 1.9, 10000]
  - VariableSelector:
      Variable: PT
      Flavs: 93
      Ranges:
        - [64.0, 10000.0]
      Ordering: [PT_UP]

EVENT_OUTPUT: HepMC3_GenEvent[WWjj_QCD.hepmc]