batch_size: 2048
num_workers: 4
pin_memory: true
task: EW_vs_Background
model_structure: ParT_Baseline
interaction_type: eta_phi_dr
num_channels: 3
pt_log_scale: true

# Model Hyperparameters
num_ParAtteBlock: 6
num_ClassAtteBlock: 2
num_heads: 8
embed_dim: [64, 512, 64]
fc_dim: 512
dropout: 0.1

learning_rate: 0.001
weight_strategy: hybrid
balance_signal_background_weights: true
max_epochs: 200
early_stopping_patience: 10
early_stopping_threshold: 0
parquet_dir: Sample/Parquet/batch_sr_parquet_mg_sample
output_dir: ./ParT/results/experiments/ew_vs_bg/exp_deep
seed: 42
